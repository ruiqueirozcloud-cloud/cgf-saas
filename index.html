<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Teste Firebase</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body style="background:#111;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px">
<div id="status" style="font-size:18px">A inicializar...</div>
<button id="btnLogin" style="display:none;padding:12px 24px;font-size:16px;cursor:pointer;border-radius:8px" onclick="login()">Entrar com Google</button>
<button id="btnOut" style="display:none;padding:10px 20px;cursor:pointer;border-radius:8px" onclick="firebase.auth().signOut()">Sair</button>
<div id="info" style="font-size:14px;color:#aaa"></div>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAGW5231Tr062elSaelRWYlArPWqnsY-Xk",
  authDomain:"cgf-saas.firebaseapp.com",
  projectId:"cgf-saas"
});
const auth = firebase.auth();

document.getElementById("status").textContent = "Firebase iniciado. A verificar auth...";

auth.getRedirectResult().then(r=>{
  if(r&&r.user) document.getElementById("info").textContent = "Redirect: "+r.user.email;
}).catch(e=>{ document.getElementById("info").textContent = "Redirect erro: "+e.message; });

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("status").textContent = "✅ Autenticado: "+user.email;
    document.getElementById("btnLogin").style.display="none";
    document.getElementById("btnOut").style.display="block";
  } else {
    document.getElementById("status").textContent = "Não autenticado";
    document.getElementById("btnLogin").style.display="block";
    document.getElementById("btnOut").style.display="none";
  }
});

function login(){
  auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider())
    .catch(e=>{ document.getElementById("info").textContent = "Erro: "+e.message; });
}
</script>
</body>
</html>
